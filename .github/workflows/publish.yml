name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag (e.g. latest, beta)"
        required: false
        default: "latest"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC-based trusted publishing

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm run typecheck

      - name: Run tests (excluding integration)
        run: npx vitest run --exclude tests/convex-integration.test.ts

      - name: Publish to npm
        run: npm publish --access public --tag ${{ github.event.inputs.tag || 'latest' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
